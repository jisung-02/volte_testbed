#####################################################################
#                   srsENB configuration file
#####################################################################
# SDR mode for Open5GS EPC

[enb]
enb_id = 0x19B
mcc = 001
mnc = 01
mme_addr = 172.22.0.9
gtp_bind_addr = 172.22.0.50
s1c_bind_addr = 172.22.0.50
s1c_bind_port = 0
n_prb = 50

[enb_files]
sib_config = sib.conf
rr_config = rr.conf
rb_config = rb.conf

[rf]
tx_gain = 80
rx_gain = 40
# SDR 설정 예시 (사용하는 SDR에 맞게 수정)
# USRP:
#   device_name = uhd
#   device_args = type=b200
# BladeRF:
#   device_name = bladerf
# LimeSDR:
#   device_name = soapy
#   device_args = driver=lime
# ZMQ (테스트용):
#   device_name = zmq
#   device_args = fail_on_disconnect=true,tx_port=tcp://*:2000,rx_port=tcp://localhost:2001,id=enb,base_srate=23.04e6

device_name = uhd
device_args = type=b200

[log]
all_level = info
all_hex_limit = 32
filename = stdout
file_max_size = -1
